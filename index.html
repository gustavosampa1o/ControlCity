<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCity - Login</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="logo-section">
                <div class="logo">
                    <div class="logo-icon">🏙️</div>
                    <h1>ControlCity</h1>
                </div>
                <p class="tagline">Plataforma Inteligente de Prevenção e Resposta a Emergências Urbanas</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="userType">Tipo de Usuário</label>
                    <select id="userType" name="userType" required>
                        <option value="">Selecione...</option>
                        <option value="admin">Administrador Municipal</option>
                        <option value="emergency">Serviços de Emergência</option>
                        <option value="citizen">Cidadão</option>
                    </select>
                </div>
                
                <button type="submit" class="login-btn">Entrar</button>
            </form>
            
            <div class="demo-credentials">
                <h3>Credenciais de Demonstração:</h3>
                <p><strong>Email:</strong> admin@controlcity.com</p>
                <p><strong>Senha:</strong> demo123</p>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
